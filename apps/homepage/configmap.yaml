---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Homelab
    favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/kubernetes.png
    headerStyle: clean
    layout:
      Cluster Management:
        style: row
        columns: 4
      Monitoring:
        style: row
        columns: 3
      Storage:
        style: row
        columns: 2
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/geewynn
        - Homelab Repo:
            - abbr: HL
              href: https://github.com/geewynn/homelab
  services.yaml: |
    - Cluster Management:
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.owoicho.org
            description: GitOps continuous delivery
            namespace: argocd
            app: argocd-server
        - Traefik:
            icon: traefik.png
            href: https://traefik.owoicho.org
            description: Ingress controller
            namespace: traefik
            app: traefik
        - Hubble:
            icon: cilium.png
            href: https://hubble.owoicho.org
            description: Network observability
        - Homepage:
            icon: homepage.png
            href: https://home.owoicho.org
            description: Dashboard

    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.owoicho.org
            description: Metrics and logs
            namespace: monitoring
            app: grafana
        - Prometheus:
            icon: prometheus.png
            description: Metrics collection
            namespace: monitoring
            app: prometheus
        - Loki:
            icon: loki.png
            description: Log aggregation
            namespace: loki
            app: loki

    - Storage:
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.owoicho.org
            description: Distributed block storage
            namespace: longhorn
            app: longhorn
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "homelab"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
