apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-storage-config
  namespace: clickhouse
data:
  storage.xml: |
    <clickhouse>
      <storage_configuration>
        <disks>
          <!-- Hot: local PV managed by the operator (mounted at /var/lib/clickhouse) -->
          <hot>
            <type>local</type>
            <path>/var/lib/clickhouse/</path>
          </hot>

          <!-- Cold: S3-compatible object storage -->
          <cold>
            <type>object_storage</type>
            <object_storage_type>s3</object_storage_type>
            <metadata_type>local</metadata_type>
            <endpoint from_env="S3_ENDPOINT" />
            <access_key_id from_env="S3_ACCESS_KEY_ID" />
            <secret_access_key from_env="S3_SECRET_ACCESS_KEY" />
          </cold>
        </disks>

        <policies>
          <!-- Default: local only (unchanged behavior) -->
          <default>
            <volumes>
              <main>
                <disk>hot</disk>
              </main>
            </volumes>
          </default>

          <hot_cold>
            <volumes>
              <hot_volume>
                <disk>hot</disk>
                <max_data_part_size_bytes>1073741824</max_data_part_size_bytes>
              </hot_volume>
              <cold_volume>
                <disk>cold</disk>
              </cold_volume>
            </volumes>
            <move_factor>0.2</move_factor>
          </hot_cold>
        </policies>
      </storage_configuration>
    </clickhouse>