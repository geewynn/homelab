apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: clickhouse-selfsigned
  namespace: clickhouse
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clickhouse-ca
  namespace: clickhouse
spec:
  isCA: true
  secretName: clickhouse-ca-tls
  issuerRef:
    name: clickhouse-selfsigned
    kind: Issuer
  commonName: clickhouse-ca
  duration: 87600h   # 10 years
  renewBefore: 8760h  # 1 year
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: clickhouse-ca-issuer
  namespace: clickhouse
spec:
  ca:
    secretName: clickhouse-ca-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clickhouse-server-tls
  namespace: clickhouse
spec:
  secretName: clickhouse-server-tls
  issuerRef:
    name: clickhouse-ca-issuer
    kind: Issuer
  commonName: clickhouse
  dnsNames:
    - clickhouse
    - clickhouse.clickhouse
    - clickhouse.clickhouse.svc
    - clickhouse.clickhouse.svc.cluster.local
    - "*.clickhouse-clickhouse-headless.clickhouse.svc.cluster.local"
  duration: 8760h   # 1 year
  renewBefore: 720h  # 30 days
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clickhouse-keeper-tls
  namespace: clickhouse
spec:
  secretName: clickhouse-keeper-tls
  issuerRef:
    name: clickhouse-ca-issuer
    kind: Issuer
  commonName: clickhouse-keeper
  dnsNames:
    - clickhouse-keeper
    - clickhouse-keeper.clickhouse
    - clickhouse-keeper.clickhouse.svc
    - clickhouse-keeper.clickhouse.svc.cluster.local
    - "*.clickhouse-keeper-keeper-headless.clickhouse.svc.cluster.local"
  duration: 8760h
  renewBefore: 720h