services:
  dnsmasq:
    build: ./dnsmasq
    volumes:
      - ./data/pxe-config/dnsmasq.conf:/etc/dnsmasq.conf
      - ./data/pxe-config/grub.cfg:/tftp/grub/grub.cfg
      - ./data/os/EFI/boot/grubx64.efi:/tftp/grubx64.efi
      - ./data/os/casper/initrd:/tftp/casper/initrd
      - ./data/os/casper/vmlinuz:/tftp/casper/vmlinuz
    network_mode: host
    cap_add:
      - NET_ADMIN
  http:
    build: ./http
    network_mode: host
    volumes:
      - ./data/iso:/usr/share/nginx/html/iso
      - ./data/init-config:/usr/share/nginx/html/init-config
    environment:
      NGINX_PORT: 80