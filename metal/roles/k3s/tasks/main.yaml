- name: Download k3s binary
  ansible.builtin.get_url:
    url: https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s
    checksum: sha256:https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-amd64.txt
    dest: /usr/local/bin/k3s
    owner: root
    group: root
    mode: "0755"

- name: Ensure config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/rancher/k3s
    - /etc/rancher/node

- name: Ensure manifests directory exists on masters
  when: "'masters' in group_names"
  ansible.builtin.file:
    path: "{{ k3s_manifests_dir }}"
    state: directory
    mode: "0755"

- name: Check if k3s token file exists on the first node
  run_once: true
  ansible.builtin.stat:
    path: "{{ k3s_token_file }}"
  register: k3s_token_file_stat

- name: Generate k3s token file on the first node if not exist yet
  run_once: true
  when: not k3s_token_file_stat.stat.exists
  ansible.builtin.copy:
    content: "{{ lookup('community.general.random_string', length=32) }}"
    dest: "{{ k3s_token_file }}"
    mode: "0600"

- name: Get k3s token from the first node
  run_once: true
  ansible.builtin.slurp:
    src: "{{ k3s_token_file }}"
  register: k3s_token_base64

- name: Ensure all nodes have the same token
  ansible.builtin.copy:
    content: "{{ k3s_token_base64.content | b64decode }}"
    dest: "{{ k3s_token_file }}"
    mode: "0600"

- name: Copy k3s config file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_file }}"
    mode: "0644"

- name: Copy k3s service file
  ansible.builtin.template:
    src: k3s.service.j2
    dest: "{{ k3s_service_file }}"
    mode: "0644"

- name: Copy kube-vip RBAC manifest
  when: "'masters' in group_names"
  ansible.builtin.template:
    src: kube-vip-rbac.yaml.j2
    dest: "{{ k3s_manifests_dir }}/kube-vip-rbac.yaml"
    mode: "0644"

- name: Copy kube-vip DaemonSet manifest
  when: "'masters' in group_names"
  ansible.builtin.template:
    src: kube-vip-daemonset.yaml.j2
    dest: "{{ k3s_manifests_dir }}/kube-vip-daemonset.yaml"
    mode: "0644"

# Bootstrap the first master, then join the rest
- name: Start k3s on first master
  when: inventory_hostname == groups['masters'][0]
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true
  register: k3s_first_master
  until: k3s_first_master is succeeded
  retries: 5
  delay: 10

- name: Wait for first master API to be ready
  when: inventory_hostname == groups['masters'][0]
  ansible.builtin.wait_for:
    port: 6443
    host: "{{ ansible_host }}"
    timeout: 120

- name: Start k3s on remaining masters
  when:
    - "'masters' in group_names"
    - inventory_hostname != groups['masters'][0]
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true
  register: k3s_service
  until: k3s_service is succeeded
  retries: 5
  delay: 10

- name: Wait for VIP to be reachable
  when: inventory_hostname == groups['masters'][0]
  ansible.builtin.wait_for:
    port: 6443
    host: "{{ control_plane_endpoint }}"
    timeout: 120

- name: Get Kubernetes config file
  when: inventory_hostname == groups['masters'][0]
  ansible.builtin.slurp:
    src: "{{ k3s_kubeconfig_file }}"
  register: kubeconfig_base64

- name: Write Kubernetes config file with the correct cluster address
  ansible.builtin.copy:
    content: "{{ kubeconfig_base64.content | b64decode | replace('127.0.0.1', control_plane_endpoint) }}"
    dest: "{{ playbook_dir }}/kubeconfig.yaml"
    mode: "0600"
  delegate_to: localhost
  run_once: true
  become: false

- name: Configure kubeconfig for user
  when: "'masters' in group_names"
  block:
    - name: Create .kube directory
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy kubeconfig to user home
      ansible.builtin.copy:
        src: "{{ k3s_kubeconfig_file }}"
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
        remote_src: true

    - name: Set KUBECONFIG in bashrc
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: "export KUBECONFIG=~/.kube/config"
        state: present
